name: Deploy a Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Crear app si no existe
        run: flyctl apps create app-inventario-bodega 2>&1 || true
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Crear volumen si no existe
        run: |
          if ! flyctl volumes list -a app-inventario-bodega | grep -q "inventario_data"; then
            flyctl volumes create inventario_data --region scl --size 1 -a app-inventario-bodega
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Configurar secreto de sesión
        run: |
          flyctl secrets set SESSION_SECRET="${{ secrets.SESSION_SECRET }}" -a app-inventario-bodega
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy
        run: flyctl deploy --remote-only -a app-inventario-bodega
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
