name: Deploy a Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Crear app si no existe
        run: flyctl apps create app-inventario-bodega 2>&1 || true
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Crear volumen si no existe
        run: |
          echo "=== Estado de la app ==="
          flyctl status -a app-inventario-bodega 2>&1 || true
          echo "=== Listado de volumenes ==="
          flyctl volumes list -a app-inventario-bodega 2>&1 || true
          echo "=== Creando volumen ==="
          if ! flyctl volumes list -a app-inventario-bodega 2>/dev/null | grep -q "inventario_data"; then
            flyctl volumes create inventario_data --region scl --size 1 -a app-inventario-bodega --yes 2>&1
          else
            echo "Volumen ya existe, omitiendo."
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Configurar secreto de sesión
        run: |
          flyctl secrets set SESSION_SECRET="${{ secrets.SESSION_SECRET }}" -a app-inventario-bodega
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy
        run: flyctl deploy --remote-only -a app-inventario-bodega
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
