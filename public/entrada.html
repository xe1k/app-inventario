<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingreso de stock</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand"><a href="/" class="back">← Panel</a> &nbsp; ➕ Ingreso de stock</div>
    <div class="user"><span id="userInfo">…</span></div>
  </header>

  <main class="container">
    <div class="card" style="max-width:520px;margin:1rem auto">
      <h2 class="section">Registrar entrada</h2>
      <p class="muted">Suma stock a la bodega (compra, reposición, ingreso).</p>

      <form id="form">
        <label>Buscar item</label>
        <input type="search" id="buscar" placeholder="Nombre o código…">
        <label>Item *</label>
        <select id="item" required></select>

        <div class="row">
          <div>
            <label>Cantidad *</label>
            <input type="number" id="cantidad" step="any" min="0.01" required>
          </div>
          <div>
            <label>Motivo</label>
            <input type="text" id="motivo" placeholder="Compra, reposición…">
          </div>
        </div>

        <label>Observación</label>
        <input type="text" id="observacion" placeholder="Opcional">

        <div class="msg" id="msg"></div>
        <button type="submit" class="btn">Registrar entrada</button>
      </form>
    </div>
  </main>

  <script src="/js/comun.js"></script>
  <script src="/js/entrada.js"></script>
</body>
</html>
